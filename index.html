<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Outstanding Management</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.default.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'SF Pro', 'Arial', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.css" />
  <link rel="stylesheet" href="assets/styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body data-theme="corporate" class="bg-[#f3f4f6] min-h-screen text-slate-800">
  <!-- Initial App Splash -->
  <div id="app-splash"
    class="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-[#070b14] transition-opacity duration-700">
    <div class="relative">
      <div
        class="w-24 h-24 rounded-3xl bg-white/5 border border-white/10 p-5 animate-pulse flex items-center justify-center overflow-hidden">
        <img src="logo.png" alt="Loading..." class="w-full h-full object-contain opacity-80" />
      </div>
      <div class="absolute -inset-4 border-2 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
    </div>
    <div class="mt-8 text-center">
      <h2 class="text-white font-black text-sm uppercase tracking-[0.4em] opacity-40 animate-pulse">Initializing System
      </h2>
      <div class="flex gap-1 justify-center mt-3">
        <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
        <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
        <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce"></div>
      </div>
    </div>
  </div>

  <div id="layout-root">
    <!-- Layout and pages will be loaded here by app.js -->
  </div>

  <script src="utils/dom.js"></script>
  <script src="assets/app.js"></script>
</body>

</html>
