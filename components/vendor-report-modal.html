<!-- Vendor Report Modal -->
<dialog id="modal-vendor-report" class="modal">
  <form method="dialog" class="modal-box w-full max-w-4xl">
    <h3 class="font-bold text-lg mb-2" id="vendor-report-title">Vendor Report</h3>
    <div id="vendor-report-content"></div>
    <div class="modal-action">
      <button class="btn" type="button" onclick="document.getElementById('modal-vendor-report').close()">Close</button>
    </div>
  </form>
</dialog>
