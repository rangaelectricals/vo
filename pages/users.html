<!-- ══════════════════════════════════════════════ USERS LIST PAGE ══ -->
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50/20 bg-premium-pattern animate-fadeIn p-5 relative">
  
  <div class="max-w-full mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h1 class="text-2xl font-black text-gray-800 tracking-tight">Manage Users</h1>
      <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">Add, edit or delete application users and their roles</p>
    </div>
    
    <div class="flex items-center gap-3">
      <button onclick="window._openUserModal()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold text-white shadow-md hover:shadow-lg active:scale-95 transition-all" style="background:linear-gradient(135deg,#4f46e5,#3730a3)">
        <span class="material-icons text-[18px]">person_add</span> Add New User
      </button>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="px-5 py-3 border-b border-gray-100 bg-gray-50/50 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="material-icons text-indigo-600 text-[18px]">admin_panel_settings</span>
        <span class="text-[11px] font-black text-gray-700 uppercase tracking-widest">Active Users</span>
        <span class="bg-indigo-100 text-indigo-700 text-[10px] font-black px-2 py-0.5 rounded-full" id="usr-cnt">0</span>
      </div>
    </div>
    <div class="overflow-x-auto hidden md:block">
      <table class="w-full text-left border-collapse min-w-[700px]">
        <thead>
          <tr class="bg-gray-50/80 text-[10px] font-black text-gray-400 uppercase tracking-wider border-b border-gray-200">
            <th class="py-3 px-4 w-8">#</th>
            <th class="py-3 px-4">FULL NAME</th>
            <th class="py-3 px-4">USERNAME</th>
            <th class="py-3 px-4 text-center">ROLE</th>
            <th class="py-3 px-4 text-center">PASSWORD</th>
            <th class="py-3 px-4 text-center">ACTIONS</th>
          </tr>
        </thead>
        <tbody id="users-table-body" class="text-sm divide-y divide-gray-50">
          <tr><td colspan="6" class="py-10 text-center text-gray-400">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
    
    <!-- Mobile Card View -->
    <div id="usr-card-grid" class="grid grid-cols-1 gap-4 p-4 md:hidden bg-[#f8fafc]"></div>
    <div class="px-5 py-3 border-t border-gray-100 bg-gray-50/40 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <select id="usr-page-size" class="text-[11px] border border-gray-200 rounded px-2 py-1 outline-none cursor-pointer">
          <option value="10">10 per page</option>
          <option value="25">25 per page</option>
          <option value="50">50 per page</option>
          <option value="-1">All</option>
        </select>
      </div>
      <div id="usr-pagination" class="flex items-center"></div>
    </div>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div id="user-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300 overflow-hidden" id="user-modal-box">
    <!-- Header -->
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-indigo-50 to-white">
      <div class="flex items-center gap-2">
        <span class="material-icons text-indigo-600" id="user-modal-icon">manage_accounts</span>
        <h2 class="text-lg font-black text-gray-800" id="user-modal-title">Add User</h2>
      </div>
      <button onclick="window._closeUserModal()" class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-gray-800 flex items-center justify-center transition-colors">
        <span class="material-icons text-[18px]">close</span>
      </button>
    </div>
    
    <!-- Body -->
    <div class="p-6">
      <form id="user-form" class="space-y-4">
        <input type="hidden" id="usr-id">
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Full Name</label>
          <input type="text" id="usr-name" required placeholder="John Doe" class="w-full px-3 py-2 border-2 border-gray-100 rounded-xl text-sm font-semibold text-gray-800 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-gray-300">
        </div>
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Login Username</label>
          <input type="text" id="usr-username" required placeholder="johndoe" autocomplete="off" class="w-full px-3 py-2 border-2 border-gray-100 rounded-xl text-sm font-semibold text-gray-800 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-gray-300">
        </div>
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Login Password</label>
          <div class="relative">
            <input type="password" id="usr-pwd" required placeholder="••••••••" autocomplete="new-password" class="w-full px-3 py-2 border-2 border-gray-100 rounded-xl text-sm font-semibold text-gray-800 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-gray-300">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-500" onclick="const p=document.getElementById('usr-pwd'); p.type = p.type==='password' ? 'text' : 'password'; this.innerHTML = p.type==='password' ? '<span class=\'material-icons text-[16px]\'>visibility</span>' : '<span class=\'material-icons text-[16px]\'>visibility_off</span>'"><span class='material-icons text-[16px]'>visibility</span></button>
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">System Role</label>
          <select id="usr-role" class="w-full px-3 py-2 border-2 border-gray-100 rounded-xl text-sm font-semibold text-gray-800 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 outline-none transition-all appearance-none cursor-pointer">
            <option value="viewer">Viewer (Read Only)</option>
            <option value="admin">Administrator (Full Access)</option>
          </select>
        </div>
      </form>
    </div>
    
    <!-- Footer -->
    <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex items-center justify-end gap-3">
      <button onclick="window._closeUserModal()" class="px-4 py-2 text-sm font-bold text-gray-500 hover:text-gray-700 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-50 transition-colors">Cancel</button>
      <button onclick="window._saveUser()" class="px-4 py-2 text-sm font-bold text-white rounded-lg shadow-sm hover:shadow-md active:scale-95 transition-all" style="background:linear-gradient(135deg,#4f46e5,#3730a3)">Save User</button>
    </div>
  </div>
</div>

<script>
(function(){
  console.log('[USERS] Initializing local user management...');
  
  if (!window.isAdmin()) {
    document.getElementById('main-content').innerHTML = `
      <div class="p-10 flex flex-col items-center justify-center text-center">
        <span class="material-icons text-red-500 text-5xl mb-3">gpp_bad</span>
        <h2 class="text-xl font-black text-gray-800">Access Denied</h2>
        <p class="text-sm text-gray-500 mt-2">Only administrators can access User Management.</p>
        <button class="mt-5 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold" onclick="window.location.hash='dashboard'">Go to Dashboard</button>
      </div>`;
    return;
  }

  function getDB() {
    let raw = localStorage.getItem('_vapp_users_db');
    if (!raw) {
      // Create defaults
      const defs = [
        { id: 1, username: 'admin',  password: 'admin123',  role: 'admin',  name: 'Administrator' },
        { id: 2, username: 'ranga',  password: 'ranga@123', role: 'admin',  name: 'Ranga' },
        { id: 3, username: 'viewer', password: 'viewer123', role: 'viewer', name: 'View Only User' }
      ];
      localStorage.setItem('_vapp_users_db', JSON.stringify(defs));
      return defs;
    }
    return JSON.parse(raw);
  }

  function renderDB() {
    const list = getDB();
    const tbody = document.getElementById('users-table-body');
    document.getElementById('usr-cnt').innerText = list.length;
    
    window.usrCurrentPage = window.usrCurrentPage || 1;
    window.usrRowsPerPage = window.usrRowsPerPage || 10;
    const totalItems = list.length;
    const totalPages = window.usrRowsPerPage === -1 ? 1 : Math.ceil(totalItems / window.usrRowsPerPage);
    if(window.usrCurrentPage > totalPages) window.usrCurrentPage = Math.max(1, totalPages);
    
    if(window.renderPaginationControls) window.renderPaginationControls(window.usrCurrentPage, totalPages, 'usr-pagination', 'goToUsrPage');
    window.goToUsrPage = function(p) { window.usrCurrentPage = p; renderDB(); };

    const startIndex = window.usrRowsPerPage === -1 ? 0 : (window.usrCurrentPage - 1) * window.usrRowsPerPage;
    const paginatedList = window.usrRowsPerPage === -1 ? list : list.slice(startIndex, startIndex + window.usrRowsPerPage);

    if(!paginatedList.length) {
       tbody.innerHTML = '<tr><td colspan="6" class="py-10 text-center text-gray-400 font-medium">No users defined.</td></tr>';
       if(document.getElementById('usr-card-grid')) document.getElementById('usr-card-grid').innerHTML = '<div class="py-10 text-center text-gray-400 text-sm font-bold">No users found.</div>';
       return;
    }
    
    tbody.innerHTML = paginatedList.map((u, index) => {
      let i = startIndex + index;
      return `
      <tr class="hover:bg-indigo-50/20 transition-colors group">
        <td class="py-2.5 px-4 text-center text-gray-400 text-[11px] font-medium">${i+1}</td>
        <td class="py-2.5 px-4">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded-full text-white flex items-center justify-center text-[10px] font-black flex-shrink-0" style="background:${u.role==='admin'?'#3f51b5':'#7c3aed'}">${u.name.charAt(0).toUpperCase()}</div>
            <span class="font-bold text-gray-800 text-[13px]">${u.name}</span>
          </div>
        </td>
        <td class="py-2.5 px-4 font-bold text-indigo-600 text-[12px]">${u.username}</td>
        <td class="py-2.5 px-4 text-center">
          <span class="text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-wider ${u.role==='admin'?'bg-blue-100 text-blue-700 border border-blue-200':'bg-purple-100 text-purple-700 border border-purple-200'}">${u.role}</span>
        </td>
        <td class="py-2.5 px-4 text-center text-[11px] text-gray-400 tracking-[0.2em] font-mono">••••••••</td>
        <td class="py-2.5 px-4 text-center">
           <div class="flex gap-1 justify-center opacity-70 group-hover:opacity-100 transition-opacity">
            <button class="w-7 h-7 rounded bg-white border border-gray-200 flex items-center justify-center text-blue-600 hover:bg-blue-50 shadow-sm transition" onclick="window._editUser(${u.id})" title="Edit"><span class="material-icons text-[14px]">edit</span></button>
            <button class="w-7 h-7 rounded bg-red-50 border border-red-100 flex items-center justify-center text-red-600 hover:bg-red-100 shadow-sm transition" onclick="window._deleteUser(${u.id})" title="Delete"><span class="material-icons text-[14px]">delete</span></button>
          </div>
        </td>
      </tr>
    `;
    }).join('');

    // Native Mobile Card Logic
    const cardGrid = document.getElementById('usr-card-grid');
    if (cardGrid) {
      cardGrid.innerHTML = paginatedList.map(u => {
        const c1 = u.role==='admin'?'#3f51b5':'#7c3aed';
        const roleCls = u.role==='admin'?'bg-blue-100 text-blue-700':'bg-purple-100 text-purple-700';
        return `
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 relative">
          <div class="absolute top-0 left-0 bottom-0 w-[5px] rounded-l-2xl" style="background:${c1}"></div>
          
          <div class="flex items-center gap-3 mb-4 ml-1">
            <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-white text-xl flex-shrink-0 shadow-sm" style="background:${c1}">${u.name.charAt(0).toUpperCase()}</div>
            <div class="flex-1 min-w-0">
              <p class="font-black text-gray-800 text-[15px] truncate leading-tight">${u.name}</p>
              <p class="text-[11px] text-gray-400 uppercase font-semibold tracking-wider mt-0.5 truncate">@${u.username}</p>
            </div>
            <span class="text-[10px] font-black px-2.5 py-1 ${roleCls} rounded-lg shadow-sm uppercase uppercase">${u.role}</span>
          </div>

          <div class="flex gap-2 w-full ml-1 pr-1 mt-2">
            <button onclick="window._editUser(${u.id})" class="flex-1 py-2.5 rounded-xl bg-indigo-50 text-indigo-700 border border-indigo-100 font-bold text-[12px] flex items-center justify-center shadow-sm transition-colors">Edit</button>
            <button onclick="window._deleteUser(${u.id})" class="flex-1 py-2.5 rounded-xl bg-gray-50 text-gray-600 border border-gray-100 font-bold text-[12px] flex items-center justify-center shadow-sm transition-colors">Delete</button>
          </div>
        </div>`;
      }).join('');
    }
  }

  window._openUserModal = function() {
    document.getElementById('usr-id').value = '';
    document.getElementById('usr-name').value = '';
    document.getElementById('usr-username').value = '';
    document.getElementById('usr-pwd').value = '';
    document.getElementById('usr-role').value = 'viewer';
    document.getElementById('user-modal-title').innerText = 'Add New User';
    
    const m = document.getElementById('user-modal');
    m.classList.remove('pointer-events-none', 'opacity-0');
    document.getElementById('user-modal-box').classList.remove('scale-95');
  };

  window._closeUserModal = function() {
    const m = document.getElementById('user-modal');
    m.classList.add('opacity-0', 'pointer-events-none');
    document.getElementById('user-modal-box').classList.add('scale-95');
  };

  window._editUser = function(id) {
    const list = getDB();
    const u = list.find(x => x.id === id);
    if (!u) return;
    
    document.getElementById('usr-id').value = u.id;
    document.getElementById('usr-name').value = u.name;
    document.getElementById('usr-username').value = u.username;
    document.getElementById('usr-pwd').value = u.password;
    document.getElementById('usr-role').value = u.role;
    document.getElementById('user-modal-title').innerText = 'Edit User';
    
    const m = document.getElementById('user-modal');
    m.classList.remove('pointer-events-none', 'opacity-0');
    document.getElementById('user-modal-box').classList.remove('scale-95');
  };

  window._saveUser = function() {
    const id = document.getElementById('usr-id').value;
    const name = document.getElementById('usr-name').value.trim();
    const username = document.getElementById('usr-username').value.trim().toLowerCase();
    const pwd = document.getElementById('usr-pwd').value.trim();
    const role = document.getElementById('usr-role').value;
    
    if(!name || !username || !pwd) return window.showToaster('All fields are required', 'error');
    
    let list = getDB();
    
    // check dupe
    if(list.find(x => x.username === username && String(x.id) !== String(id))) {
      return window.showToaster('Username already exists', 'error');
    }
    
    if (id) {
       let idx = list.findIndex(x => String(x.id) === String(id));
       if(idx !== -1) {
         list[idx] = { id: parseInt(id), name, username, password: pwd, role };
       }
    } else {
       list.push({ id: Date.now(), name, username, password: pwd, role });
    }
    
    localStorage.setItem('_vapp_users_db', JSON.stringify(list));
    window._closeUserModal();
    window.showToaster('User saved successfully');
    renderDB();
    
    // check if it's oneself
    const sesh = window.getSession();
    if(sesh && sesh.username === username && pwd !== sesh.password) {
       window.showToaster('Password changed. Please re-login on next visit.', 'warning');
    }
  };

  window._deleteUser = function(id) {
    const list = getDB();
    const u = list.find(x => x.id === id);
    const sesh = window.getSession();
    
    if(u && sesh && u.username === sesh.username) {
      return window.showToaster("You cannot delete your own account!", "error");
    }
    
    if(!confirm('Are you sure you want to delete this user?')) return;
    
    let newList = list.filter(x => x.id !== id);
    localStorage.setItem('_vapp_users_db', JSON.stringify(newList));
    window.showToaster('User deleted');
    renderDB();
  };

  document.getElementById('usr-page-size')?.addEventListener('change', (e) => {
    window.usrRowsPerPage = parseInt(e.target.value);
    window.usrCurrentPage = 1;
    renderDB();
  });

  renderDB();
})();
</script>
