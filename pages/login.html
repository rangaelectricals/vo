<div id="login-root" class="fixed inset-0 flex items-center justify-center z-[9999] overflow-hidden transition-all duration-700 font-sans"
  style="background: radial-gradient(at 0% 0%, #1e293b 0%, #0f172a 100%);">
  
  <!-- Perspective Decorative Elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-blue-600/10 rounded-full blur-[100px] animate-pulse" style="animation-delay: 1s;"></div>
    
    <!-- Grid Overlay -->
    <div class="absolute inset-0 opacity-[0.03]" 
         style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 50px 50px;"></div>
  </div>

  <div class="relative w-full max-w-[440px] px-6 animate-fadeInUp">
    <div class="bg-white/95 backdrop-blur-2xl rounded-[32px] shadow-2xl border border-white/20 overflow-hidden relative group">
      <!-- Glow effect on hover -->
      <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-blue-600 opacity-0 group-hover:opacity-10 transition-opacity duration-500 rounded-[32px] blur"></div>
      
      <div class="relative bg-white rounded-[31px]">
        <!-- Brand Header -->
        <div class="pt-10 pb-6 text-center">
            <div class="inline-flex w-24 h-24 rounded-3xl bg-slate-50 p-4 border border-slate-100 shadow-sm mb-6 mx-auto group-hover:scale-110 transition-transform duration-500">
                <img src="logo.png" alt="Company Logo" class="w-full h-full object-contain" />
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight uppercase">VendorApp</h1>
            <p class="text-[10px] text-indigo-500 font-black uppercase tracking-[0.3em] mt-1.5 opacity-80">Ranga Electricals Pvt Ltd</p>
        </div>

        <div class="px-10 pb-10">
            <!-- Alert Display -->
            <div id="login-error" class="hidden mb-6 px-4 py-3.5 bg-red-50 border border-red-100 rounded-2xl flex items-center gap-3 text-red-600 animate-shake">
                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm">
                    <span class="material-icons text-[18px]">error</span>
                </div>
                <p class="text-[11px] font-black uppercase tracking-tight" id="login-error-msg">Authentication Failed</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Identity</label>
                    <div class="relative group/field">
                        <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within/field:text-indigo-500 transition-colors text-[20px]">person</span>
                        <input type="text" id="login-username" placeholder="Username" required autocomplete="username"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-bold text-slate-800 placeholder:text-slate-300 outline-none focus:border-indigo-500/20 focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all" />
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Credentials</label>
                    <div class="relative group/field">
                        <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within/field:text-indigo-500 transition-colors text-[20px]">lock</span>
                        <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password"
                            class="w-full pl-12 pr-12 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-bold text-slate-800 placeholder:text-slate-300 outline-none focus:border-indigo-500/20 focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all" />
                        <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 p-2 transition-colors">
                            <span class="material-icons text-[20px]" id="pw-eye-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" id="login-btn"
                        class="w-full py-4.5 rounded-2xl bg-slate-900 text-white font-black text-sm flex items-center justify-center gap-3 shadow-xl shadow-slate-900/10 hover:shadow-2xl hover:shadow-indigo-500/20 hover:bg-indigo-600 active:scale-[0.98] transition-all group/btn">
                        <span id="login-btn-text">Establish Connection</span>
                        <span class="material-icons text-[20px] transition-transform group-hover/btn:translate-x-1" id="login-icon">arrow_forward</span>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider text-center mb-4 opacity-60">Developer/Test Access</p>
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="window._quickLogin('admin','admin123')"
                        class="py-2.5 rounded-xl bg-slate-50 text-slate-600 font-black text-[10px] uppercase tracking-widest border border-slate-100 hover:bg-slate-100 transition-colors">Admin</button>
                    <button type="button" onclick="window._quickLogin('viewer','viewer123')"
                        class="py-2.5 rounded-xl bg-slate-50 text-slate-600 font-black text-[10px] uppercase tracking-widest border border-slate-100 hover:bg-slate-100 transition-colors">Viewer</button>
                </div>
            </div>
        </div>
      </div>
    </div>
    
    <p class="mt-8 text-center text-[10px] font-bold text-slate-500 uppercase tracking-widest opacity-40">
        &copy; 2024 Ranga Electricals &bull; Secure Protocol
    </p>
  </div>
</div>

<style>
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fadeInUp { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

input:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 50px white inset !important;
    -webkit-text-fill-color: #1e293b !important;
}
#login-btn { padding-top: 1.1rem; padding-bottom: 1.1rem; }
</style>

<script>
(function() {
  const form    = document.getElementById('login-form');
  const btn     = document.getElementById('login-btn');
  const btnText = document.getElementById('login-btn-text');
  const btnIcon = document.getElementById('login-icon');
  const errBox  = document.getElementById('login-error');
  const errMsg  = document.getElementById('login-error-msg');
  const pwInput = document.getElementById('login-password');
  const eyeIcon = document.getElementById('pw-eye-icon');

  // Password toggle
  document.getElementById('toggle-password').onclick = () => {
    const isPw = pwInput.type === 'password';
    pwInput.type = isPw ? 'text' : 'password';
    eyeIcon.textContent = isPw ? 'visibility_off' : 'visibility';
  };

  window._quickLogin = (u, p) => {
    document.getElementById('login-username').value = u;
    document.getElementById('login-password').value = p;
    form.dispatchEvent(new Event('submit'));
  };

  function showError(msg) {
    errMsg.textContent = msg;
    errBox.classList.remove('hidden');
    btn.disabled = false;
    btnText.textContent = 'Establish Connection';
    btnIcon.textContent = 'arrow_forward';
    btn.className = btn.className.replace('bg-emerald-500', 'bg-slate-900').replace('bg-indigo-600', 'bg-slate-900');
  }

  function loginSuccess(user) {
    try {
      localStorage.setItem('_vapp_user', JSON.stringify({ username: user.username, name: user.name, role: user.role }));
    } catch(e) { console.error('LocalStorage error:', e); }

    window._appUser = user;
    btn.disabled = true;
    btnText.textContent = 'Connection Secured';
    btnIcon.textContent = 'verified_user';
    btn.classList.remove('bg-slate-900', 'hover:bg-indigo-600');
    btn.classList.add('bg-emerald-500');
    
    document.getElementById('login-root').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('login-root').remove();
      if (typeof window._bootApp === 'function') window._bootApp();
      else window.location.reload();
    }, 600);
  }

  form.onsubmit = function(e) {
    e.preventDefault();
    const u = document.getElementById('login-username').value.trim().toLowerCase();
    const p = document.getElementById('login-password').value;
    
    if (!u || !p) return;

    btn.disabled = true;
    btnText.textContent = 'Verifying Identity...';
    btnIcon.textContent = 'hourglass_top';
    errBox.classList.add('hidden');

    const scriptUrl = window.CONFIG && window.CONFIG.SCRIPT_URL;
    if (scriptUrl) {
      const url = scriptUrl + '?action=login&username=' + encodeURIComponent(u) + '&password=' + encodeURIComponent(p);
      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (data.success) loginSuccess(data.user);
          else showError(data.error || 'Identity Verification Failed');
        })
        .catch(err => _localLogin(u, p));
    } else {
      _localLogin(u, p);
    }
  };

  function _localLogin(u, p) {
    let localUsers = JSON.parse(localStorage.getItem('_vapp_users_db') || '[]');
    if (localUsers.length === 0) {
      localUsers = [
        { id: 1, username: 'admin',  password: 'admin123',  role: 'admin',  name: 'Administrator' },
        { id: 2, username: 'ranga',  password: 'ranga@123', role: 'admin',  name: 'Ranga' },
        { id: 3, username: 'viewer', password: 'viewer123', role: 'viewer', name: 'View Only User' }
      ];
      localStorage.setItem('_vapp_users_db', JSON.stringify(localUsers));
    }
    const user = localUsers.find(x => x.username === u && x.password === p);
    if (user) loginSuccess(user);
    else showError('Invalid Identity Credentials');
  }
})();
</script>
