<div id="login-root" class="fixed inset-0 flex items-center justify-center z-[9999] overflow-hidden"
  style="background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%); opacity: 1; transition: opacity 0.4s ease;">

  <!-- Animated background blobs -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full opacity-20"
      style="background:radial-gradient(circle,#3b82f6,transparent);animation:pulse 4s ease-in-out infinite;"></div>
    <div class="absolute -bottom-24 -right-24 w-80 h-80 rounded-full opacity-15"
      style="background:radial-gradient(circle,#818cf8,transparent);animation:pulse 5s ease-in-out infinite 1s;"></div>
  </div>

  <div class="relative w-full max-w-[420px] mx-4">
    <div class="relative bg-white/95 backdrop-blur-xl rounded-3xl overflow-hidden shadow-2xl border border-white/20">
      <!-- Header -->
      <div class="relative px-8 pt-8 pb-6 text-center" style="background:linear-gradient(135deg,#1e40af 0%,#3b82f6 100%)">
        <div class="relative inline-flex w-16 h-16 rounded-2xl bg-white/20 backdrop-blur items-center justify-center mb-4 shadow-inner mx-auto">
          <span class="material-icons text-white text-3xl">store_mall_directory</span>
        </div>
        <h1 class="text-2xl font-black text-white tracking-tight">VendorApp</h1>
        <p class="text-blue-100 text-[11px] font-bold uppercase tracking-widest mt-1">Secure Sign In</p>
      </div>

      <!-- Form Body -->
      <div class="px-8 py-7">
        <div id="login-error" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl flex items-center gap-2 text-red-600 text-xs font-bold animate-shake">
          <span class="material-icons text-[18px]">error_outline</span>
          <span id="login-error-msg">Invalid credentials</span>
        </div>

        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Username</label>
            <input type="text" id="login-username" placeholder="Username" required autocomplete="username"
              class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl text-sm font-semibold text-gray-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all placeholder:text-gray-300" />
          </div>

          <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Password</label>
            <div class="relative">
              <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password"
                class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl text-sm font-semibold text-gray-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all placeholder:text-gray-300" />
              <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-500 p-1">
                <span class="material-icons text-[18px]" id="pw-eye-icon">visibility</span>
              </button>
            </div>
          </div>

          <button type="submit" id="login-btn"
            class="w-full py-4 rounded-xl text-sm font-black text-white flex items-center justify-center gap-2 transition-all shadow-lg hover:shadow-xl active:scale-[0.98]"
            style="background:linear-gradient(135deg,#2563eb,#1d4ed8)">
            <span class="material-icons text-[18px]" id="login-icon">login</span>
            <span id="login-btn-text">Sign In</span>
          </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 grid grid-cols-2 gap-3">
           <button type="button" onclick="window._quickLogin('admin','admin123')" class="px-3 py-2 text-[10px] font-black text-blue-600 bg-blue-50 border border-blue-100 rounded-lg hover:bg-blue-100 transition-colors uppercase tracking-wider">Quick Admin</button>
           <button type="button" onclick="window._quickLogin('viewer','viewer123')" class="px-3 py-2 text-[10px] font-black text-purple-600 bg-purple-50 border border-purple-100 rounded-lg hover:bg-purple-100 transition-colors uppercase tracking-wider">Quick Viewer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  console.log('[LOGIN] Script executing...');
  
  const form    = document.getElementById('login-form');
  const btn     = document.getElementById('login-btn');
  const btnText = document.getElementById('login-btn-text');
  const btnIcon = document.getElementById('login-icon');
  const errBox  = document.getElementById('login-error');
  const errMsg  = document.getElementById('login-error-msg');
  const pwInput = document.getElementById('login-password');
  const eyeIcon = document.getElementById('pw-eye-icon');

  // Password toggle
  document.getElementById('toggle-password').onclick = () => {
    const isPw = pwInput.type === 'password';
    pwInput.type = isPw ? 'text' : 'password';
    eyeIcon.textContent = isPw ? 'visibility_off' : 'visibility';
  };

  window._quickLogin = (u, p) => {
    document.getElementById('login-username').value = u;
    document.getElementById('login-password').value = p;
    form.dispatchEvent(new Event('submit'));
  };

  function showError(msg) {
    console.warn('[LOGIN] Authentication failed:', msg);
    errMsg.textContent = msg;
    errBox.classList.remove('hidden');
    btn.disabled = false;
    btnText.textContent = 'Sign In';
    btnIcon.textContent = 'login';
    btn.style.background = 'linear-gradient(135deg,#2563eb,#1d4ed8)';
  }

  function loginSuccess(user) {
    console.log('[LOGIN] Success! User:', user.username);
    try {
      localStorage.setItem('_vapp_user', JSON.stringify({ username: user.username, name: user.name, role: user.role }));
    } catch(e) { console.error('LocalStorage error:', e); }

    window._appUser = user;
    btn.disabled = true;
    btnText.textContent = 'Success!';
    btnIcon.textContent = 'check_circle';
    btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
    
    document.getElementById('login-root').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('login-root').remove();
      if (typeof window._bootApp === 'function') {
        console.log('[LOGIN] Booting main app...');
        window._bootApp();
      } else {
        console.error('[LOGIN] _bootApp not found! Reloading...');
        window.location.reload();
      }
    }, 400);
  }

  form.onsubmit = function(e) {
    e.preventDefault();
    const u = document.getElementById('login-username').value.trim().toLowerCase();
    const p = document.getElementById('login-password').value;
    
    if (!u || !p) return;

    btn.disabled = true;
    btnText.textContent = 'Verifying...';
    btnIcon.textContent = 'sync';
    errBox.classList.add('hidden');

    const scriptUrl = window.CONFIG && window.CONFIG.SCRIPT_URL;
    if (scriptUrl) {
      console.log('[LOGIN] Attempting GSheet authentication...');
      const url = scriptUrl + '?action=login&username=' + encodeURIComponent(u) + '&password=' + encodeURIComponent(p);
      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (data.success) loginSuccess(data.user);
          else showError(data.error || 'Invalid username or password.');
        })
        .catch(err => {
          console.error('[LOGIN] Fetch error:', err);
          _localLogin(u, p);
        });
    } else {
      console.log('[LOGIN] No script URL, using fallback...');
      _localLogin(u, p);
    }
  };

  function _localLogin(u, p) {
    let localUsers = JSON.parse(localStorage.getItem('_vapp_users_db') || '[]');
    if (localUsers.length === 0) {
      localUsers = [
        { id: 1, username: 'admin',  password: 'admin123',  role: 'admin',  name: 'Administrator' },
        { id: 2, username: 'ranga',  password: 'ranga@123', role: 'admin',  name: 'Ranga' },
        { id: 3, username: 'viewer', password: 'viewer123', role: 'viewer', name: 'View Only User' }
      ];
      localStorage.setItem('_vapp_users_db', JSON.stringify(localUsers));
    }
    const user = localUsers.find(x => x.username === u && x.password === p);
    if (user) loginSuccess(user);
    else showError('Invalid username or password.');
  }

})();
</script>
